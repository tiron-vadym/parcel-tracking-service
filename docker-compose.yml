services:
  web:
    build: .
    entrypoint:
      - /bin/sh
      - -c
      - |
        python manage.py migrate --noinput || exit 1
        python manage.py ensure_initial_user || exit 1
        python manage.py seed_demo_data || exit 1
        exec python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: parcels
      DB_USER: parcels
      DB_PASSWORD: parcels
      DB_HOST: db
      DB_PORT: 5432
      INITIAL_USER_USERNAME: worker
      INITIAL_USER_PASSWORD: devpass123
      INITIAL_USER_EMAIL: worker@example.com
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: parcels
      POSTGRES_USER: parcels
      POSTGRES_PASSWORD: parcels
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parcels -d parcels"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  pgdata:
